<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open in Obsidian</title>
</head>
<body>
  <p id="msg">Opening Obsidian…</p>
  <p><a id="fallback" href="#">Open in Obsidian</a></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const vault = params.get("vault");
    const file = params.get("file");

    if (!vault || !file) {
      document.getElementById("msg").textContent = "Missing vault or file parameter.";
    } else {
      const uri = `obsidian://open?vault=${encodeURIComponent(vault)}&file=${encodeURIComponent(file)}`;
      document.getElementById("fallback").href = uri;
      window.location.href = uri;
    }
  </script>
</body>
</html>
